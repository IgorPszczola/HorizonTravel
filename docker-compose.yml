services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: horizontravel-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  backend:
    build:
      context: ./backend/HorizonTravel
      dockerfile: Dockerfile
    container_name: horizontravel-backend
    ports:
      - "60247:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=HorizonTravelDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;Encrypt=False;
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: horizontravel-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures HMR works correctly on Windows hosts
    depends_on:
      - backend

volumes:
  mssql-data:
